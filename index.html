<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Decision Copilot｜AI决策助手</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    body {
      background: #f5f7fa;
      padding: 40px 20px;
      max-width: 800px;
      margin: 0 auto;
    }
    .title {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #1f2937;
    }
    .subtitle {
      color: #6b7280;
      margin-bottom: 30px;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
    }
    textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
    }
    button {
      width: 100%;
      padding: 14px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
    }
    button:disabled {
      background: #94a3b8;
      cursor: not-allowed;
    }
    .loading {
      margin-top: 16px;
      color: #2563eb;
    }
    .result {
      margin-top: 20px;
      padding: 20px;
      background: #f9fafb;
      border-radius: 12px;
      white-space: pre-wrap;
      line-height: 1.7;
    }
  </style>
</head>
<body>

  <div class="title">AI Decision Copilot</div>
  <div class="subtitle">AI产品作品集｜大模型决策助手</div>

  <div class="card">
    <div class="form-group">
      <label>📝 决策问题</label>
      <textarea id="question" rows="2" placeholder="例如：实习选大厂还是创业公司"></textarea>
    </div>
    <div class="form-group">
      <label>🅰️ 选项A</label>
      <textarea id="optA" rows="3"></textarea>
    </div>
    <div class="form-group">
      <label>🅱️ 选项B</label>
      <textarea id="optB" rows="3"></textarea>
    </div>

    <button onclick="run()" id="btn">🚀 开始AI分析</button>
    <div id="loading" style="display:none" class="loading">AI 正在思考中...</div>
    <div id="result" class="result" style="display:none"></div>
  </div>

<script>
async function run() {
  const q = document.getElementById("question").value;
  const a = document.getElementById("optA").value;
  const b = document.getElementById("optB").value;
  const btn = document.getElementById("btn");
  const loading = document.getElementById("loading");
  const result = document.getElementById("result");

  if (!q || !a || !b) {
    alert("请填写完整信息");
    return;
  }

  btn.disabled = true;
  loading.style.display = "block";
  result.style.display = "none";

  try {
    const resp = await fetch("https://api.miclle.com/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer sk-6666666666666666666666"
      },
      body: JSON.stringify({
        model: "gpt-3.5-turbo",
        messages: [{
          role: "user",
          content: `你是专业决策助手，请根据用户输入的问题和选项，进行详细、结构化、有逻辑的分析，必须严格按格式输出。

用户问题：${q}
选项A：${a}
选项B：${b}

请输出：
【决策问题】
【最终建议】
【详细对比分析】
【适合人群】
【决策依据】`
        }]
      })
    });

    const data = await resp.json();
    result.innerText = data.choices[0].message.content;
  } catch (e) {
    result.innerText = "【决策问题】" + q + "\n\n【最终建议】\n无法联网获取AI分析，请检查网络后重试。";
  } finally {
    btn.disabled = false;
    loading.style.display = "none";
    result.style.display = "block";
  }
}
</script>

</body>
</html>
