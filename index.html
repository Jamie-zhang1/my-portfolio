<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>我的作品</title>
  <style>
    body {
      font-family: Arial;
      margin: 40px;
      background: #f7f7f7;
    }
    h1 {
      color: #333;
    }
    .card {
      background: white;
      padding: 20px;
      margin-top: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    button {
      padding: 10px 20px;
      background: black;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    textarea {
      width: 100%;
      height: 80px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h1>👋 作品1</h1>
<p>研究生 | AI产品经理方向</p>

<div class="card">
  <h2>📌 项目：决策助手</h2>
  <p><b>项目介绍：</b>帮助用户在多个选项中进行结构化分析并给出决策建议。</p>

  <h3>📝 输入你的问题</h3>
  <textarea id="question" placeholder="例如：选A公司还是B公司"></textarea>

  <h3>🅰️ 选项A</h3>
  <textarea id="optionA"></textarea>

  <h3>🅱️ 选项B</h3>
  <textarea id="optionB"></textarea>

  <br><br>
  <button onclick="analyze()">🚀 开始分析</button>

  <div id="result" style="margin-top:20px;"></div>
</div>

<script>
function analyze() {
  const q = document.getElementById("question").value;
  const a = document.getElementById("optionA").value;
  const b = document.getElementById("optionB").value;

  const result = `
  <h3>📌 推荐结论</h3>
  <p>👉 示例：如果你更看重成长，建议选择B</p>
  <h3>📊 对比分析</h3>
  <p>A更稳定，B成长更快</p>
  <h3>👤 适合人群</h3>
  <p>A适合求稳，B适合拼成长</p>
  <h3>🧠 决策依据</h3>
  <p>根据你输入的信息生成</p>
  `;

  document.getElementById("result").innerHTML = result;
}
</script>

</body>
</html>
